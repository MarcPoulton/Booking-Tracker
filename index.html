<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holiday Home Booking Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Holiday Home Booking Tracker</h1>
      <p>Track bookings, stay length, and monthly occupancy.</p>
    </header>

    <div id="edit-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
        <div class="modal-header">
          <h3 id="edit-modal-title">Edit Booking</h3>
          <button type="button" class="modal-close" id="close-edit-modal" aria-label="Close">×</button>
        </div>

        <form id="edit-booking-form" class="modal-form">
          <div class="form-row">
            <label for="edit-guestName">Guest Name</label>
            <input type="text" id="edit-guestName" name="guestName" required />
          </div>

          <div class="form-row-inline">
            <div class="form-row">
              <label for="edit-checkIn">Check-in</label>
              <input type="date" id="edit-checkIn" name="checkIn" required />
            </div>
            <div class="form-row">
              <label for="edit-checkOut">Check-out</label>
              <input type="date" id="edit-checkOut" name="checkOut" required />
            </div>
          </div>

          <div class="form-row">
            <label for="edit-amountPaid">Amount paid (£)</label>
            <input type="number" id="edit-amountPaid" name="amountPaid" min="0" step="0.01" placeholder="0.00" />
          </div>

          <div class="form-row">
            <label for="edit-notes">Notes</label>
            <textarea id="edit-notes" name="notes" rows="2" placeholder="Optional notes"></textarea>
          </div>

          <div class="form-actions">
            <button type="submit">Save Changes</button>
            <button type="button" id="cancel-edit-modal">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <div id="delete-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-dialog confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
        <div class="modal-header">
          <h3 id="delete-modal-title">Delete Booking?</h3>
          <button type="button" class="modal-close" id="close-delete-modal" aria-label="Close">x</button>
        </div>
        <p id="delete-modal-message">Are you sure you want to delete this booking?</p>
        <div class="form-actions">
          <button type="button" id="confirm-delete-button" class="danger">Delete</button>
          <button type="button" id="cancel-delete-button">Cancel</button>
        </div>
      </div>
    </div>

    <div id="all-bookings-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-dialog modal-large" role="dialog" aria-modal="true" aria-labelledby="all-bookings-title">
        <div class="modal-header">
          <h3 id="all-bookings-title">All Bookings</h3>
          <button type="button" class="modal-close" id="close-all-bookings-modal" aria-label="Close">×</button>
        </div>
        <div id="all-bookings-content" class="modal-bookings-list"></div>
      </div>
    </div>

    <section class="panel booking-form-panel">
      <h2>New Booking</h2>
      <form id="booking-form">
        <div class="form-row">
          <label for="guestName">Guest Name</label>
          <input type="text" id="guestName" name="guestName" required />
        </div>

        <div class="form-row-inline">
          <div class="form-row">
            <label for="checkIn">Check-in</label>
            <input type="date" id="checkIn" name="checkIn" required />
          </div>
          <div class="form-row">
            <label for="checkOut">Check-out</label>
            <input type="date" id="checkOut" name="checkOut" required />
          </div>
        </div>

        <div class="form-row">
          <label for="amountPaid">Amount paid (£)</label>
          <input type="number" id="amountPaid" name="amountPaid" min="0" step="0.01" placeholder="0.00" />
        </div>

        <div class="form-row">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="2" placeholder="Optional notes"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit">Save Booking</button>
          <button type="button" id="clear-form">Clear</button>
        </div>
      </form>
    </section>

    <section class="panel summary-panel">
      <h2>Summary</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <span class="summary-label">Total bookings</span>
          <strong id="totalBookings">0</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Total nights</span>
          <strong id="totalNights">0</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Total earnings</span>
          <strong id="totalEarnings">£0.00</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Current month occupancy</span>
          <strong id="currentOccupancy">0%</strong>
        </div>
      </div>
      <button type="button" id="show-all-bookings-button" class="floating-action-button">View all bookings</button>
    </section>

    <section class="panel calendar-panel">
      <div class="calendar-header">
        <h2>Calendar</h2>
        <div class="month-controls">
          <button id="prevMonth">‹</button>
          <span id="calendarMonth"></span>
          <button id="nextMonth">›</button>
        </div>
      </div>
      <div class="calendar" id="calendar"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
